# Build & push wokki-client to Docker Hub.
# GitHub repo secrets (chỉ 2): DOCKER_USERNAME, DOCKER_PASSWORD
# Runtime env (NEXT_PUBLIC_*, ports, …) → Dokploy / docker/.env

name: Docker publish

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "components/**"
      - "hooks/**"
      - "lib/**"
      - "public/**"
      - "types/**"
      - "docker/Dockerfile"
      - "docker/entrypoint.js"
      - "proxy.ts"
      - "package.json"
      - "package-lock.json"
      - "next.config.*"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:

env:
  IMAGE_NAME: wokki-client

jobs:
  publish:
    runs-on: ubuntu-latest
    concurrency:
      group: docker-publish-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build and push (attempt 1)
        id: build_push_1
        uses: docker/build-push-action@v6
        continue-on-error: true
        with:
          context: .
          file: docker/Dockerfile
          target: runner
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push (attempt 2)
        id: build_push_2
        if: steps.build_push_1.outcome == 'failure'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: runner
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Ensure build and push succeeded
        if: steps.build_push_1.outcome == 'failure' && steps.build_push_2.outcome == 'failure'
        run: |
          echo "Both build/push attempts failed."
          exit 1

      - name: Verify latest tag is pullable
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest"
          echo "Verifying $IMAGE"

          for attempt in 1 2 3 4 5; do
            echo "Pull attempt $attempt/5"
            if docker pull "$IMAGE"; then
              docker image inspect "$IMAGE" --format 'Pulled image ID: {{.Id}}'
              exit 0
            fi
            sleep 10
          done

          echo "Unable to pull latest after retries."
          exit 1
