# Dev — hot reload. Env: docker/.env.local

name: wokki-client-dev

services:
  wokki_client:
    container_name: wokki_client_dev
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: dev
    image: wokki/wokki-client:dev
    env_file:
      - .env.local
    ports:
      - "${CLIENT_PORT:-6789}:6789"
    volumes:
      - ..:/app
      - wokki_client_node_modules:/app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    restart: unless-stopped

volumes:
  wokki_client_node_modules:
