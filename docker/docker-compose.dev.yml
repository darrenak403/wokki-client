# Dev — hot reload. Env: docker/.env.local

name: wokki-client-dev

x-logging: &wokki-dev-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "2"

services:
  wokki_client:
    container_name: wokki_client_dev
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: dev
      cache_from:
        - wokki/wokki-client:dev
    image: wokki/wokki-client:dev
    env_file:
      - .env.local
    ports:
      - "${CLIENT_PORT:-6789}:6789"
    volumes:
      - ..:/app
      - wokki_client_node_modules:/app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING_INTERVAL: "1000"
      NODE_OPTIONS: "--max-old-space-size=2048"
    init: true
    restart: unless-stopped
    logging: *wokki-dev-logging
    deploy:
      resources:
        limits:
          memory: 2G

volumes:
  wokki_client_node_modules:
