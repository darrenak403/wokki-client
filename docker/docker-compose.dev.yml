name: wokki-client-dev

services:
  wokki-client:
    container_name: wokki-client-dev
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: dev
    env_file:
      - .env.local
    ports:
      - "6789:6789"
    volumes:
      - ..:/app
      - wokki_client_node_modules:/app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING_INTERVAL: "1000"
    restart: unless-stopped

volumes:
  wokki_client_node_modules:
