# Usage: docker compose -f docker/docker-compose.prod.yml --env-file docker/.env up -d
# npm run docker:prod
#
# CI/CD: GitHub Actions → Docker Hub → Dokploy pull
# Deploy BE trước FE — network wokki-network

name: wokki-client-prod

x-logging: &wokki-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  wokki_client:
    container_name: wokki_client
    pull_policy: always
    image: ${DOCKER_USERNAME}/wokki-client:${IMAGE_TAG:-latest}
    init: true
    logging: *wokki-logging
    ports:
      - "${CLIENT_PORT:-6789}:6789"
    environment:
      - NODE_ENV=production
      - PORT=6789
      - HOSTNAME=0.0.0.0
      - NEXT_TELEMETRY_DISABLED=1
      - NODE_OPTIONS=--max-old-space-size=${NODE_MAX_OLD_SPACE:-384}
      - UV_THREADPOOL_SIZE=${UV_THREADPOOL_SIZE:-4}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:6789/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: ${CLIENT_MEMORY_LIMIT:-512M}
    restart: unless-stopped
    networks:
      - wokki-network

networks:
  wokki-network:
    name: wokki-network
    external: true
